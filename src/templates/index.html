<!DOCTYPE html>
<html lang="it" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeepAlive Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            /* Sfondo Moderno Gradiente */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container { max-width: 1000px; }
        
        /* Card Style */
        .card {
            background-color: rgba(30, 30, 30, 0.7); /* Semicitrasparente */
            backdrop-filter: blur(10px); /* Effetto vetro */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }

        /* Status Dots */
        .status-dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .bg-success-glow { background-color: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .bg-danger-glow { background-color: #ff4d4d; box-shadow: 0 0 10px #ff4d4d; }
        .bg-warning-glow { background-color: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        .bg-grey { background-color: #6c757d; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container py-5">
        
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-0 text-white"><i class="fa-solid fa-satellite-dish me-2"></i> KeepAlive</h2>
                <small class="text-white-50">Monitoraggio attivo servizi</small>
            </div>
            <div>
                <button class="btn btn-outline-light me-2" onclick="refreshData()">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#addModal">
                    <i class="fa-solid fa-plus"></i> Aggiungi
                </button>
            </div>
        </div>

        <!-- Grid Host -->
        <div class="row g-4">
            {% for host in hosts %}
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 position-relative {% if not host.active %}opacity-50{% endif %}" id="card-{{host.id}}">
                    <div class="card-body">
                        <!-- Intestazione Card -->
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="card-title mb-0 fw-bold text-white">{{ host.name }}</h5>
                            <span class="badge bg-dark border border-secondary">{{ host.interval }} min</span>
                        </div>
                        
                        <!-- URL -->
                        <p class="card-text text-truncate mb-3">
                            <a href="{{ host.url }}" target="_blank" class="text-decoration-none text-info small">
                                <i class="fa-solid fa-link me-1"></i> {{ host.url }}
                            </a>
                        </p>
                        
                        <!-- Status Area (Aggiornato via JS) -->
                        <div class="p-3 rounded bg-black bg-opacity-25 mb-3">
                            <div id="status-container-{{host.id}}">
                                <!-- Placeholders che verranno sovrascritti da JS al caricamento -->
                                <span class="status-dot bg-grey"></span> <span class="text-muted">Caricamento...</span>
                            </div>
                            <div class="mt-2 d-flex justify-content-between align-items-end">
                                <span class="text-muted small" style="font-size: 0.75rem;">
                                    <i class="fa-regular fa-clock"></i> <span id="last-check-{{host.id}}">...</span>
                                </span>
                                <span class="text-white small fw-bold" id="latency-{{host.id}}"></span>
                            </div>
                        </div>

                        <!-- Bottoni Azione -->
                        <div class="d-flex justify-content-between border-top border-secondary pt-3">
                            <!-- Ping Manuale -->
                            <button class="btn btn-sm btn-light text-dark fw-bold" onclick="manualPing({{host.id}}, this)" title="Ping Ora">
                                <i class="fa-solid fa-bolt"></i> Ping
                            </button>

                            <div class="btn-group">
                                <a href="/toggle/{{ host.id }}" class="btn btn-sm btn-outline-secondary" title="Pausa/Avvia">
                                    <i class="fa-solid {% if host.active %}fa-pause{% else %}fa-play{% endif %}"></i>
                                </a>
                                <button class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#editModal{{ host.id }}" title="Modifica">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <a href="/delete/{{ host.id }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Eliminare?')" title="Elimina">
                                    <i class="fa-solid fa-trash"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Edit Modal (Stesso di prima) -->
            <div class="modal fade" id="editModal{{ host.id }}" tabindex="-1">
                <div class="modal-dialog">
                    <form action="/edit/{{ host.id }}" method="POST">
                        <div class="modal-content bg-dark border-secondary">
                            <div class="modal-header border-secondary">
                                <h5 class="modal-title text-white">Modifica {{ host.name }}</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="text-muted">Nome</label>
                                    <input type="text" name="name" class="form-control bg-dark text-white border-secondary" value="{{ host.name }}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="text-muted">URL</label>
                                    <input type="url" name="url" class="form-control bg-dark text-white border-secondary" value="{{ host.url }}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="text-muted">Intervallo (min)</label>
                                    <input type="number" name="interval" class="form-control bg-dark text-white border-secondary" value="{{ host.interval }}" min="1" required>
                                </div>
                            </div>
                            <div class="modal-footer border-secondary">
                                <button type="submit" class="btn btn-success">Salva</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <form action="/add" method="POST">
                <div class="modal-content bg-dark border-secondary">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title text-white">Nuovo Host</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="text-muted">Nome</label>
                            <input type="text" name="name" class="form-control bg-dark text-white border-secondary" placeholder="Nome servizio" required>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted">URL</label>
                            <input type="text" name="url" class="form-control bg-dark text-white border-secondary" placeholder="render.com..." required>
                        </div>
                        <div class="mb-3">
                            <label class="text-muted">Intervallo (min)</label>
                            <input type="number" name="interval" class="form-control bg-dark text-white border-secondary" value="15" min="1" required>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="submit" class="btn btn-primary">Crea</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JAVASCRIPT PER AGGIORNAMENTI REAL-TIME -->
    <script>
        // Funzione per aggiornare la UI
        function refreshData() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    data.forEach(host => {
                        const container = document.getElementById(`status-container-${host.id}`);
                        const timeSpan = document.getElementById(`last-check-${host.id}`);
                        const latencySpan = document.getElementById(`latency-${host.id}`);
                        const card = document.getElementById(`card-${host.id}`);

                        if (!container) return;

                        // Aggiorna Opacità Card (Attivo/Inattivo)
                        if (!host.active) {
                             card.classList.add('opacity-50');
                        } else {
                             card.classList.remove('opacity-50');
                        }

                        // Genera HTML Stato
                        let statusHtml = '';
                        if (!host.active) {
                            statusHtml = '<span class="status-dot bg-grey"></span> <span class="text-muted">In Pausa</span>';
                            latencySpan.innerText = '';
                        } else if (host.last_status === 200) {
                            statusHtml = '<span class="status-dot bg-success-glow"></span> <span class="text-success fw-bold">Online (200)</span>';
                            latencySpan.innerText = host.last_response_time + ' ms';
                            latencySpan.className = 'text-success small fw-bold';
                        } else if (host.last_status === 0) {
                            statusHtml = '<span class="status-dot bg-danger-glow"></span> <span class="text-danger fw-bold">Errore Conn.</span>';
                            latencySpan.innerText = 'Timeout/Error';
                            latencySpan.className = 'text-danger small fw-bold';
                        } else if (host.last_status === null) {
                            statusHtml = '<span class="status-dot bg-warning-glow"></span> <span class="text-warning">In attesa...</span>';
                            latencySpan.innerText = '';
                        } else {
                            statusHtml = `<span class="status-dot bg-danger-glow"></span> <span class="text-danger fw-bold">Errore ${host.last_status}</span>`;
                            latencySpan.innerText = host.last_response_time + ' ms';
                        }

                        container.innerHTML = statusHtml;
                        timeSpan.innerText = host.last_check;
                    });
                })
                .catch(err => console.error('Errore fetch status:', err));
        }

        // Funzione Ping Manuale
        function manualPing(id, btnElement) {
            // Animazione bottone
            const originalHtml = btnElement.innerHTML;
            btnElement.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            btnElement.disabled = true;

            fetch(`/api/ping/${id}`, { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    // Refresh immediato dei dati
                    refreshData();
                    // Ripristina bottone dopo poco
                    setTimeout(() => {
                        btnElement.innerHTML = originalHtml;
                        btnElement.disabled = false;
                    }, 500);
                })
                .catch(err => {
                    alert('Errore durante il ping manuale');
                    btnElement.innerHTML = originalHtml;
                    btnElement.disabled = false;
                });
        }

        // Avvia polling: aggiorna ogni 5 secondi
        setInterval(refreshData, 5000);
        
        // Prima chiamata immediata al caricamento
        document.addEventListener('DOMContentLoaded', refreshData);
    </script>
</body>
</html>
